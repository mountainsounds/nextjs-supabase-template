name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      deployments: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel preview deployment
        id: vercel-preview
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Polling GitHub Deployments API for Vercel preview URL..."
          REPO="${{ github.repository }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          TIMEOUT=300
          INTERVAL=10
          ELAPSED=0
          PREVIEW_URL=""

          while [ $ELAPSED -lt $TIMEOUT ]; do
            DEPLOYMENT=$(gh api \
              "repos/${REPO}/deployments?sha=${SHA}" \
              --jq 'map(select(.environment | startswith("Preview"))) | first // null' \
              2>/dev/null || true)

            if [ -n "$DEPLOYMENT" ] && [ "$DEPLOYMENT" != "null" ]; then
              DEPLOYMENT_ID=$(echo "$DEPLOYMENT" | jq -r '.id')
              STATUS=$(gh api "repos/${REPO}/deployments/${DEPLOYMENT_ID}/statuses" \
                --jq 'first | .state' 2>/dev/null || true)

              if [ "$STATUS" = "success" ]; then
                PREVIEW_URL=$(gh api "repos/${REPO}/deployments/${DEPLOYMENT_ID}/statuses" \
                  --jq 'first | .environment_url' 2>/dev/null || true)
                echo "Preview URL: ${PREVIEW_URL}"
                echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
                break
              fi
            fi

            echo "Not ready yet (${ELAPSED}s elapsed). Retrying in ${INTERVAL}s..."
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          # Use bash variable — not a template expression — for the post-loop check
          if [ -z "$PREVIEW_URL" ]; then
            echo "ERROR: Timed out waiting for Vercel preview deployment."
            exit 1
          fi

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel-preview.outputs.preview_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:e2e
